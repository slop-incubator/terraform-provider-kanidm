resource: person
go_client_field: Accounts
crud:
  create: CreatePerson
  read:   GetUser
  update: UpdatePerson
  delete: DeletePerson
attributes:
  - name: name
    type: string
    required: true
    requires_replace: true
  - name: display_name
    type: string
    required: true
  - name: mail
    type: set_string
    optional: true
    computed: true
  - name: spn
    type: string
    computed: true
