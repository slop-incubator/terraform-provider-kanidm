resource: service_account
go_client_field: Accounts
crud:
  create: CreateServiceAccount
  read:   GetServiceAccount
  update: UpdateServiceAccount
  delete: DeleteServiceAccount
attributes:
  - name: name
    type: string
    required: true
    requires_replace: true
  - name: display_name
    type: string
    required: true
  - name: entry_managed_by
    type: string
    optional: true
  - name: spn
    type: string
    computed: true
