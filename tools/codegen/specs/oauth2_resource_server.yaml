resource: oauth2_resource_server
go_client_field: OAuth2
crud:
  create: CreateResourceServer
  read:   GetResourceServer
  update: UpdateResourceServer
  delete: DeleteResourceServer
attributes:
  - name: name
    type: string
    required: true
    requires_replace: true
  - name: display_name
    type: string
    required: true
  - name: origin
    type: string
    required: true
  - name: scope_maps
    type: map_set_string
    optional: true
    computed: true
  - name: sup_scope_maps
    type: map_set_string
    optional: true
    computed: true
