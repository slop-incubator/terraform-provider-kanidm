version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - noctx
    - bodyclose
    - exhaustive
    - gocritic
    - gofmt
    - goimports
    - misspell
    - nilerr
    - prealloc
    - unconvert
    - unparam

linters-settings:
  gosec:
    excludes:
      # G402: TLS InsecureSkipVerify is intentional and guarded by provider logic.
      - G402
  goimports:
    local-prefixes: github.com/slop-incubator/terraform-provider-kanidm

issues:
  exclude-rules:
    # Test files can use broad assertions and globals.
    - path: "_test\\.go"
      linters:
        - gosec
        - unparam
    # Generated scaffold files have TODOs by design.
    - path: "tools/codegen/templates"
      linters:
        - gocritic

run:
  timeout: 5m
