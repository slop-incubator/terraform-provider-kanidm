version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - noctx
    - bodyclose
    - exhaustive
    - gocritic
    - misspell
    - nilerr
    - prealloc
    - unconvert
    - unparam
  settings:
    gosec:
      excludes:
        # G402: TLS InsecureSkipVerify is intentional and guarded by provider logic.
        - G402
  exclusions:
    rules:
      # Test files can use broad assertions and globals.
      - path: "_test\\.go"
        linters:
          - gosec
          - unparam
      # Generated scaffold files have TODOs by design.
      - path: "tools/codegen/templates"
        linters:
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/slop-incubator/terraform-provider-kanidm

run:
  timeout: 5m
