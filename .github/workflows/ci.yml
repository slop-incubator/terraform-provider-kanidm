name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -v -count=1 -race ./...
        env:
          TF_ACC: ""  # explicitly unset — unit tests must not require a live Kanidm

  schema-diff:
    name: Schema drift check (nightly)
    runs-on: ubuntu-latest
    # Only run on the default branch; acceptance infra not available on PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start Kanidm
        run: bash scripts/bootstrap-kanidm.sh

      - name: Run schema-sync
        run: make schema-diff KANIDM_URL=https://localhost:8443
        env:
          KANIDM_TLS_STRICT: "0"  # local test instance uses self-signed cert
